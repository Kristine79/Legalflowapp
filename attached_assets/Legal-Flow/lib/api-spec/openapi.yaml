openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI analysis operations
  - name: analytics
    description: Dashboard analytics operations
  - name: users
    description: Current user operations
  - name: clients
    description: Client operations
  - name: cases
    description: Case operations
  - name: activities
    description: Activity operations
  - name: tasks
    description: Task operations
  - name: notifications
    description: Notification and Telegram operations
  - name: calendar
    description: Calendar event operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ai/analyze:
    post:
      operationId: analyzeIntake
      tags: [ai]
      summary: Analyze legal intake
      description: Analyzes a legal issue description and returns a structured AI summary, category, priority, and recommended next action.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeAnalysisInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeAnalysis"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
