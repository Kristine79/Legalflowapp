components:
  schemas:
    Uuid:
      type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    IntakeAnalysisInput:
      type: object
      properties:
        description:
          type: string
          minLength: 1
      required:
        - description
    IntakeAnalysisPriority:
      type: string
      enum: [low, medium, high, urgent]
    IntakeAnalysis:
      type: object
      properties:
        summary:
          type: string
        category:
          type: string
        type:
          type: string
        priority:
          $ref: "#/components/schemas/IntakeAnalysisPriority"
          nullable: true
        risks:
          type: array
          items:
            type: string
        questions:
          type: array
          items:
            type: string
        documents:
          type: array
          items:
            type: string
        nextAction:
          type: string
      required:
        - summary
        - category
        - risks
        - questions
        - documents
        - nextAction
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    UserRole:
      type: string
      enum: [owner, admin, lawyer, assistant, client]
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        firmName:
          type: string
          nullable: true
        initials:
          type: string
          nullable: true
        telegramChatId:
          type: string
          nullable: true
        telegramNotificationsEnabled:
          type: boolean
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - role
        - createdAt
        - updatedAt
    UserInput:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
          nullable: true
        firmName:
          type: string
          nullable: true
        initials:
          type: string
          nullable: true
        telegramChatId:
          type: string
          nullable: true
        telegramNotificationsEnabled:
          type: boolean
          nullable: true
      required:
        - email
    UpdateUserRoleInput:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/UserRole"
      required:
        - role
    TaskStatus:
      type: string
      enum: [pending, in-progress, done, cancelled]
    TaskStatusInput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"
      required:
        - status
