kind = "web"
previewPath = "/"
title = "LegalFlow"
version = "1.0.0"
id = "artifacts/legalflow"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20496

[services.development]
run = "pnpm --filter @workspace/legalflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/legalflow", "run", "build" ]
serve = "static"
publicDir = "artifacts/legalflow/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20496"
BASE_PATH = "/"
